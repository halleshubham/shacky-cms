services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jap_password}
      POSTGRES_DB: ${POSTGRES_DB:-shacky_cms}
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-jap} -d ${POSTGRES_DB:-shacky_cms}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio_init:
    image: minio/mc:latest
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/shacky-media;
      mc anonymous set download local/shacky-media;
      exit 0;
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgresql://jap:jap_password@postgres:5432/shacky_cms}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: shacky-media
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      CORS_ORIGIN: ${APP_URL}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@example.com}
    healthcheck:
      test: ['CMD', 'node', '-e', 'require("http").get("http://127.0.0.1:4000/health",(r)=>{process.exit(r.statusCode<400?0:1)}).on("error",()=>process.exit(1))']
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:4000
        API_INTERNAL_URL: http://api:4000
        MINIO_INTERNAL_URL: http://minio:9000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      API_INTERNAL_URL: http://api:4000
      MINIO_INTERNAL_URL: http://minio:9000

volumes:
  postgres_data:
  redis_data:
  minio_data:
